<!DOCTYPE html>
<head>
    <title>Weeks Browse Page</title>
    <link rel="stylesheet" href="weekspage.css">
</head>

<body>
    <div class="container">

<!--Video background of the page-->
        <video class="background-video" autoplay muted loop>
            <source src="videos/vhs_tape.mp4" type="video/mp4">
        </video>
          <div id="bg-overlay"></div>

 <!-- Row of photos and the info -->
             <div class="sub-title">
                <h1>scanning...</h1>
             </div>

<!-- Row of photos and the info (style=transform:rotation was added through troubleshooting with ClaudeAI) -->
         <div class="rowofphotos">
            <div class="photo" style="transform:rotate(-7deg);">
                <a href="week1.html">
                     <img class="photo-content" src="images/week1.png" alt="photo of bubble wrap"></img>
                </a>
                <div class="photo-label">WEEK 1</div>
            </div>
            
            <div class="photo" style="transform:rotate(4deg);">
                <a href="week2.html">
                    <img class="photo-content" src="images/week2.png" alt="photo of interaction mockup from week2"></img>
                </a>
                <div class="photo-label">WEEK 2</div>
            </div>
            
            <div class="photo" style="transform:rotate(-3deg);">
                <a href="week3.html">
                    <img class="photo-content" src="images/week3.png" alt="photo of stitch"></img>
                </a>
                <div class="photo-label">WEEK 3</div>
            </div>
        </div>
<!-- Row of photos and the info (style=transform:rotation was added through troubleshooting with ClaudeAI): END -->

 <!-- Back 'button' anchor -->
             <div class="back-button">
                <a href="index.html">Back to Camera!</a>
             </div>

    </div>

</body>
</html>
